name: Build Cyclone2DpadFilter

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cyclone2DpadFilter.*"
      - ".github/workflows/build-driver.yml"

jobs:
  build:
    name: Build ${{ matrix.configuration }} ${{ matrix.platform }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
        platform:
          - x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The EWDK ISO is ~5 GB. Cache it so reruns and the second matrix job
      # skip the download.
      - name: Cache EWDK ISO
        id: ewdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\ewdk.iso
          key: ewdk-iso-25h2-26100-linkid2335681

      - name: Download EWDK ISO
        if: steps.ewdk-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          # Windows 11 25H2 EWDK (build 26100) with Visual Studio Build Tools
          # 17.14.0, matching the windows-2022 runner. Self-contained: SDK, WDK,
          # build tools, and driver MSBuild targets, so no VS / WDK VSIX setup is
          # needed. Use curl.exe rather than Invoke-WebRequest, which is orders
          # of magnitude slower on multi-GB files. fwlink from the EWDK page.
          Write-Host "Downloading EWDK ISO..."
          curl.exe -L --fail --retry 3 --retry-delay 5 -o "$iso" "https://go.microsoft.com/fwlink/?linkid=2335681"
          if ($LASTEXITCODE -ne 0) {
            throw "curl exited with $LASTEXITCODE"
          }

      - name: Mount EWDK ISO
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          Write-Host "Mounting EWDK ISO..."
          $mount = Mount-DiskImage -ImagePath $iso -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          if (-not $drive) {
            throw "Failed to determine the EWDK mount drive letter."
          }
          "EWDK_DRIVE=$drive" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "EWDK mounted at ${drive}:"

      - name: Build driver
        shell: cmd
        timeout-minutes: 30
        run: |
          rem LaunchBuildEnv.cmd sets up the build environment and returns; it
          rem does not accept a build command as an argument. Set up the env,
          rem then run msbuild as a separate command in the same cmd session.
          call "%EWDK_DRIVE%:\LaunchBuildEnv.cmd"

          rem The EWDK dev prompt does not put msbuild on PATH or set
          rem VSINSTALLDIR. Resolve MSBuild from the EWDK's Build Tools install,
          rem falling back to a search restricted to the Visual Studio dir (a
          rem search over all of Program Files matches a bogus NETFXSDK stub).
          set "MSBUILD="
          set "VSROOT=%EWDK_DRIVE%:\Program Files\Microsoft Visual Studio\2022\BuildTools"
          if exist "%VSROOT%\MSBuild\Current\Bin\amd64\MSBuild.exe" set "MSBUILD=%VSROOT%\MSBuild\Current\Bin\amd64\MSBuild.exe"
          if not defined MSBUILD if exist "%VSROOT%\MSBuild\Current\Bin\MSBuild.exe" set "MSBUILD=%VSROOT%\MSBuild\Current\Bin\MSBuild.exe"
          if not defined MSBUILD (
            echo MSBuild not at expected path, searching under Visual Studio dir...
            for /r "%EWDK_DRIVE%:\Program Files\Microsoft Visual Studio" %%f in (MSBuild.exe) do set "MSBUILD=%%f"
          )
          if not defined MSBUILD (
            echo Could not locate MSBuild.exe under the EWDK.
            dir /b "%EWDK_DRIVE%:\Program Files\Microsoft Visual Studio\2022"
            exit /b 1
          )
          echo Using MSBUILD=%MSBUILD%

          rem The EWDK leaves VCTargetsPath without its drive/prefix (it derives
          rem from the unset VSINSTALLDIR), so the Microsoft.Cpp imports fail.
          rem Point it at the EWDK's VC targets directory via the environment.
          rem MSBuild reads VCTargetsPath from the env; passing it as a /p: arg
          rem breaks because the trailing backslash escapes the closing quote.
          set "VCTargetsPath=%VSROOT%\MSBuild\Microsoft\VC\v170\"
          echo VCTargetsPath=%VCTargetsPath%
          if not exist "%VCTargetsPath%Microsoft.Cpp.Default.props" (
            echo VCTargetsPath invalid: %VCTargetsPath%
            dir /b "%VSROOT%\MSBuild\Microsoft\VC"
            exit /b 1
          )

          "%MSBUILD%" "%GITHUB_WORKSPACE%\Cyclone2DpadFilter.vcxproj" /t:Clean,Build /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:minimal
          if errorlevel 1 (
            echo msbuild failed
            exit /b 1
          )
          echo === Build output ===
          dir /s /b "%GITHUB_WORKSPACE%\x64"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Cyclone2DpadFilter-${{ matrix.configuration }}-${{ matrix.platform }}
          # Build output dir is <project>\x64\<Configuration>\. Targeting it
          # avoids picking up the source .inf at the repo root, and
          # if-no-files-found:error fails the job if the build produced nothing.
          path: |
            x64\${{ matrix.configuration }}\*.sys
            x64\${{ matrix.configuration }}\*.inf
            x64\${{ matrix.configuration }}\*.cat
            x64\${{ matrix.configuration }}\*.pdb
          if-no-files-found: error
