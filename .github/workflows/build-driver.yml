name: Build Cyclone2DpadFilter

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cyclone2DpadFilter.*"
      - ".github/workflows/build-driver.yml"

jobs:
  build:
    name: Build ${{ matrix.configuration }} ${{ matrix.platform }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
        platform:
          - x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download and mount the EWDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          # Windows 11 25H2 EWDK (build 26100) with Visual Studio Build Tools
          # 17.14.0, which matches the windows-2022 runner. The EWDK is a
          # self-contained ISO that ships the SDK, WDK, build tools, and the
          # driver MSBuild targets, so no Visual Studio / WDK VSIX integration
          # is required. fwlink from the EWDK download page.
          Write-Host "Downloading EWDK ISO..."
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2335681" -OutFile $iso -UseBasicParsing

          Write-Host "Mounting EWDK ISO..."
          $mount = Mount-DiskImage -ImagePath $iso -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          if (-not $drive) {
            throw "Failed to determine the EWDK mount drive letter."
          }
          "EWDK_DRIVE=$drive" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "EWDK mounted at ${drive}:"

      - name: Build driver
        shell: cmd
        run: |
          call %EWDK_DRIVE%:\LaunchBuildEnv.cmd msbuild "%GITHUB_WORKSPACE%\Cyclone2DpadFilter.vcxproj" /t:Clean,Build /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Cyclone2DpadFilter-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            **\*.sys
            **\*.inf
            **\*.cat
            **\*.pdb
