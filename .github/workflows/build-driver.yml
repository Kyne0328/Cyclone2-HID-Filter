name: Build Cyclone2DpadFilter

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cyclone2DpadFilter.*"
      - ".github/workflows/build-driver.yml"

jobs:
  build:
    name: Build ${{ matrix.configuration }} ${{ matrix.platform }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
        platform:
          - x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The EWDK ISO is about 5 GB. Cache it so reruns and the second matrix job
      # skip the download.
      - name: Cache EWDK ISO
        id: ewdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\ewdk.iso
          key: ewdk-iso-25h2-26100-linkid2335681

      - name: Download EWDK ISO
        if: steps.ewdk-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          # Windows 11 25H2 EWDK (build 26100) with Visual Studio Build Tools
          # 17.14.0, matching the windows-2022 runner. Self-contained: SDK, WDK,
          # build tools, and driver MSBuild targets, so no VS / WDK VSIX setup is
          # needed. Use curl.exe rather than Invoke-WebRequest, which is much
          # slower on multi-GB files. fwlink from the EWDK page.
          Write-Host "Downloading EWDK ISO..."
          curl.exe -L --fail --retry 3 --retry-delay 5 -o "$iso" "https://go.microsoft.com/fwlink/?linkid=2335681"
          if ($LASTEXITCODE -ne 0) {
            throw "curl exited with $LASTEXITCODE"
          }

      - name: Mount EWDK ISO
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          Write-Host "Mounting EWDK ISO..."
          $mount = Mount-DiskImage -ImagePath $iso -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          if (-not $drive) {
            throw "Failed to determine the EWDK mount drive letter."
          }
          "EWDK_DRIVE=$drive" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "EWDK mounted at ${drive}:"

      - name: Build, catalog, and test-sign driver package
        shell: cmd
        timeout-minutes: 30
        run: |
          rem Set up the EWDK build environment in this cmd.exe process.
          call "%EWDK_DRIVE%:\BuildEnv\SetupBuildEnv.cmd"
          if errorlevel 1 ( echo SetupBuildEnv failed & exit /b 1 )

          rem The EWDK is not registry-installed, so pass its real SDK version.
          echo Version_Number=%Version_Number%
          set "WINSDKVER=%Version_Number%"
          if not defined WINSDKVER (
            echo Version_Number is not set; dumping candidate env vars:
            set Version
            set WindowsSDK
            exit /b 1
          )

          rem Build the driver binary. We generate the package catalog manually
          rem below, then test-sign that catalog.
          msbuild "%GITHUB_WORKSPACE%\Cyclone2DpadFilter.vcxproj" /t:Clean,Build /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:WindowsTargetPlatformVersion=%WINSDKVER% /p:SignMode=Off /p:EnableInf2Cat=false /v:minimal
          set "RC=%ERRORLEVEL%"

          echo === Build output tree (x64) ===
          dir /s /b "%GITHUB_WORKSPACE%\x64" 2>nul

          if not "%RC%"=="0" ( echo msbuild failed with %RC% & exit /b %RC% )

          rem Assemble a clean package dir with just the files that belong in
          rem the install package. inf2cat hashes everything in this directory.
          set "OUT=%GITHUB_WORKSPACE%\x64\${{ matrix.configuration }}"
          set "PKG=%GITHUB_WORKSPACE%\package"
          if exist "%PKG%" rmdir /s /q "%PKG%"
          mkdir "%PKG%"
          copy /y "%OUT%\Cyclone2DpadFilter.sys" "%PKG%\" >nul
          copy /y "%OUT%\Cyclone2DpadFilter.inf" "%PKG%\" >nul

          set "INF2CAT=%EWDK_DRIVE%:\Program Files\Windows Kits\10\bin\%WINSDKVER%\x86\inf2cat.exe"
          if not exist "%INF2CAT%" set "INF2CAT=inf2cat.exe"
          echo Using INF2CAT=%INF2CAT%
          "%INF2CAT%" /driver:"%PKG%" /os:10_19H1_X64
          if errorlevel 1 ( echo inf2cat failed & exit /b 1 )

          rem Create a temporary self-signed test certificate, sign the catalog,
          rem and export the public certificate so the target PC can trust it.
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject 'CN=Cyclone2DpadFilter Test Certificate' -KeyAlgorithm RSA -KeyLength 2048 -HashAlgorithm SHA256 -CertStoreLocation 'Cert:\CurrentUser\My' -NotAfter (Get-Date).AddYears(3); Export-Certificate -Cert $cert -FilePath '%PKG%\Cyclone2DpadFilter-TestCert.cer' | Out-Null; Set-Content -Path '%PKG%\Cyclone2DpadFilter-TestCert-Thumbprint.txt' -Value $cert.Thumbprint"
          if errorlevel 1 ( echo certificate creation failed & exit /b 1 )

          for /f "usebackq delims=" %%T in ("%PKG%\Cyclone2DpadFilter-TestCert-Thumbprint.txt") do set "CERT_THUMBPRINT=%%T"
          if not defined CERT_THUMBPRINT ( echo certificate thumbprint missing & exit /b 1 )

          set "SIGNTOOL=%EWDK_DRIVE%:\Program Files\Windows Kits\10\bin\%WINSDKVER%\x64\signtool.exe"
          if not exist "%SIGNTOOL%" set "SIGNTOOL=signtool.exe"
          echo Using SIGNTOOL=%SIGNTOOL%
          "%SIGNTOOL%" sign /fd SHA256 /sha1 %CERT_THUMBPRINT% "%PKG%\Cyclone2DpadFilter.cat"
          if errorlevel 1 ( echo signtool sign failed & exit /b 1 )

          "%SIGNTOOL%" verify /v /pa "%PKG%\Cyclone2DpadFilter.cat"
          if errorlevel 1 ( echo signtool verify failed & exit /b 1 )

          rem Copy symbols after cataloging/signing so they are not part of the
          rem signed driver package catalog.
          if exist "%OUT%\Cyclone2DpadFilter.pdb" copy /y "%OUT%\Cyclone2DpadFilter.pdb" "%PKG%\" >nul

          echo === Package dir ===
          dir /b "%PKG%"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Cyclone2DpadFilter-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            package\*.sys
            package\*.inf
            package\*.cat
            package\*.cer
            package\*.txt
            package\*.pdb
          if-no-files-found: error
