name: Build Cyclone2DpadFilter

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cyclone2DpadFilter.*"
      - ".github/workflows/build-driver.yml"

jobs:
  build:
    name: Build ${{ matrix.configuration }} ${{ matrix.platform }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
        platform:
          - x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The EWDK ISO is ~5 GB. Cache it so reruns and the second matrix job
      # skip the download.
      - name: Cache EWDK ISO
        id: ewdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\ewdk.iso
          key: ewdk-iso-25h2-26100-linkid2335681

      - name: Download EWDK ISO
        if: steps.ewdk-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          # Windows 11 25H2 EWDK (build 26100) with Visual Studio Build Tools
          # 17.14.0, matching the windows-2022 runner. Self-contained: SDK, WDK,
          # build tools, and driver MSBuild targets, so no VS / WDK VSIX setup is
          # needed. Use curl.exe rather than Invoke-WebRequest, which is orders
          # of magnitude slower on multi-GB files. fwlink from the EWDK page.
          Write-Host "Downloading EWDK ISO..."
          curl.exe -L --fail --retry 3 --retry-delay 5 -o "$iso" "https://go.microsoft.com/fwlink/?linkid=2335681"
          if ($LASTEXITCODE -ne 0) {
            throw "curl exited with $LASTEXITCODE"
          }

      - name: Mount EWDK ISO
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iso = "$env:RUNNER_TEMP\ewdk.iso"

          Write-Host "Mounting EWDK ISO..."
          $mount = Mount-DiskImage -ImagePath $iso -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          if (-not $drive) {
            throw "Failed to determine the EWDK mount drive letter."
          }
          "EWDK_DRIVE=$drive" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "EWDK mounted at ${drive}:"

      # DIAGNOSTIC ONLY: reveal how the EWDK sets up its environment so the
      # build can call the in-process setup script(s) directly, instead of
      # LaunchBuildEnv.cmd which configures the env inside a spawned child shell
      # (env is then lost to later commands). Remove once the build is fixed.
      - name: Inspect EWDK environment setup
        shell: cmd
        run: |
          echo ===== ISO ROOT =====
          dir /b "%EWDK_DRIVE%:\"
          echo.
          echo ===== *.cmd in ISO ROOT =====
          dir /b "%EWDK_DRIVE%:\*.cmd"
          echo.
          echo ===== BuildEnv folder =====
          dir /b "%EWDK_DRIVE%:\BuildEnv" 2>nul
          echo.
          echo ===== LaunchBuildEnv.cmd CONTENTS =====
          type "%EWDK_DRIVE%:\LaunchBuildEnv.cmd"
          echo.
          echo ===== END =====
          exit /b 1

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Cyclone2DpadFilter-${{ matrix.configuration }}-${{ matrix.platform }}
          # Build output dir is <project>\x64\<Configuration>\. Targeting it
          # avoids picking up the source .inf at the repo root, and
          # if-no-files-found:error fails the job if the build produced nothing.
          path: |
            x64\${{ matrix.configuration }}\*.sys
            x64\${{ matrix.configuration }}\*.inf
            x64\${{ matrix.configuration }}\*.cat
            x64\${{ matrix.configuration }}\*.pdb
          if-no-files-found: error
