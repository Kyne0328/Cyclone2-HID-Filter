name: Build XInput1_4 Proxy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dllmain.cpp"
      - "XInput1_4.def"
      - "XInput1_4.vcxproj"
      - ".github/workflows/build-proxy.yml"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        platform:
          - Win32
          - x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build proxy DLL
        run: msbuild XInput1_4.vcxproj /t:Rebuild /p:Configuration=Release /p:Platform=${{ matrix.platform }} /v:minimal

      - name: Show output
        shell: pwsh
        run: Get-ChildItem -Recurse "${{ matrix.platform }}\Release" | Select-Object FullName, Length

      - name: Upload proxy DLL
        uses: actions/upload-artifact@v4
        with:
          name: XInput1_4-proxy-${{ matrix.platform }}
          path: |
            ${{ matrix.platform }}\Release\XInput1_4.dll
            ${{ matrix.platform }}\Release\XInput1_4.pdb
            tools\windows\install-proxy.ps1
            tools\windows\uninstall-proxy.ps1
          if-no-files-found: error
